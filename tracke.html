<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/beb9c9acc8.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gradient-to-b from-sky-300 via-white/60 to-sky-300  h-screen">
    <div class="bg-white p-6 max-w-xl mx-auto space-y-6 rounded-xl">
        <h2 class="font-bold text-3xl flex justify-center">Daily Expense Tracker</h2>

        <div class="bg-black p-6 rounded-ful text-white flex">
            <p class="p-4 font-bold text-2xl">Total Spent Today:</p>
            <span id="totalAmount" class="font-bold text-2xl p-4"> Ksh. 0</span>
        </div>

        <!--------Form------------->
        <form id="expenseForm">
            <!--Description-->
            <input id="description" type="text"  placeholder="Description"
            class="border border-gray-300 px-3 w-full p-2 rounded-xl">
            <!--Amount-->

            <input id="amount" type="text" placeholder="Amount (Ksh)"
            class="border border-gray-300 px-3 p-2 rounded-xl w-full mt-6">

            <!--Chose cartegory-->
            <h3 class="font-bold text-xl mt-3">
                Choose Category
            </h3>

            <div class="grid grid-cols-4 p-4 py-5">

                <!--Shopping-->
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Food">

                   <i class="fa-solid fa-bag-shopping text-emerald-500 text-3xl mt-2 ml-3"></i>
                   <p class="mt-4 text-sm ">Food</p>

                </div>
                <!--Transport-->
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Transport">

                   <i class="fa-solid fa-car text-sky-500 text-3xl ml-3 mt-3"></i>
                   <p class="mt-3 text-sm">Transport</p>

                </div>
                <!--Entertainment-->
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Entertainment">

                  <i class="fa-solid fa-crown text-3xl text-amber-300 ml-6 mt-3"></i>
                  <p class="mt-2 text-sm">Entertainment</p>

                </div>
                <!--Home-->
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Home">

                  <i class="fa-solid fa-house text-3xl text-purple-700 ml-1 mt-3"></i>
                  <p class="mt-2 text-sm">Home</p>

                </div>
                <!--Internet-->
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Internet">

                  <i class="fa-solid fa-wifi text-3xl ml-2 mt-2 text-emerald-500"></i>
                  <p class="mt-3 text-sm">Internet</p>

                </div>
                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Shopping">

                  <i class="fa-solid fa-book text-3xl ml-3 mt-2 text-sky-500"></i>
                  <p class="text-sm mt-3">Education</p>

                </div>

                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="water">

                  <i class="fa-solid fa-droplet text-3xl mt-3 text-blue-700"></i>
                  <p class="text-sm mt-2">Water</p>

                </div>

                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Business">

                  <i class="fa-solid fa-business-time text-3xl mt-3 text-purple-700 ml-2"></i>
                  <p class="mt-3 text-sm">Business</p>

                </div>

                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Rent">

                  <i class="fa-solid fa-key text-3xl mt-3 text-emerald-500"></i>
                  <p class="text-sm mt-3">Rent</p>

                </div>

                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Gym">

                  <i class="fa-solid fa-dumbbell text-3xl mt-3 text-sky-500"></i>
                  <p class="mt-3 text-sm">Gym</p>
                    
                </div>

                <div class="category-card bg-white shadow p-4 rounded-xl cursor-pointer hover:bg-gray-100"
                  data-category="Others">

                  <i class="fa-solid fa-plus text-3xl mt-2 text-purple-700"></i>
                  <p class="mt-4 text-sm px-2 ">Add Category</p>
                    
                </div>

            </div>
            
            <button id="addBtn" type="submit" class="bg-sky-500 text-white w-full mt-6 flex justify-center p-4 rounded-xl hover:bg-sky-900 cursor-pointer text-xl font-bold">
            Add Expense
        </button>
        </form>

       
        <hr>

        <h3 class="font-bold text-xl">Expense list</h3>

        <div id="expenseList">

        </div>

            <div>
                <h3 class="font-bold mt-6">Filter Expenses</h3>

                <select id="filterCategory" class="border border-gray-300 p-3 rounded-xl w-full mt-2">
                    <option value="All">All Categories</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Home">Home</option>
                    <option value="Internet">Internet</option>
                    <option value="Water">Water</option>
                    <option value="Business">Business</option>
                    <option value="Rent">Rent</option>
                    <option value="Gym">Gym</option>
                    <option value="Education">Education</option>
                    <option value="Add">Add Category</option>
                </select>

                
            </div>
        <div>

        </div>

    </div>
    
</body>
<script src="script.js"></script>
</html>
